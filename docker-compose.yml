
x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-api-server:8080/execution/"
  AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
  AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs

  AIRFLOW__CORE__JWT_SECRET_KEY: "9f8c1b7d9a2e4f6c8b0a1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
  AIRFLOW__API_AUTH__JWT_SECRET: "9f8c1b7d9a2e4f6c8b0a1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"

  PYTHONPATH: /opt/airflow

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10

  airflow-init:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    command: ["airflow", "db", "migrate"]

  airflow-api-server:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "9090:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./former:/opt/airflow/former
      - ./tests:/opt/airflow/tests
      - airflow-logs:/opt/airflow/logs
    environment:
      <<: *airflow-env
      AIRFLOW__API__SECRET_KEY: "another_long_secret_for_ui_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    command: ["airflow", "api-server"]

  airflow-scheduler:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./former:/opt/airflow/former
      - airflow-logs:/opt/airflow/logs
    environment:
      <<: *airflow-env
    command: ["airflow", "scheduler"]

  airflow-dag-processor:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./former:/opt/airflow/former
      - airflow-logs:/opt/airflow/logs
    environment:
      <<: *airflow-env
    command: ["airflow", "dag-processor"]

volumes:
  postgres-db-volume:
  airflow-logs: