x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-api-server:8080/execution/"
  AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
  AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs

  AIRFLOW__CORE__JWT_SECRET_KEY: "9f8c1b7d9a2e4f6c8b0a1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
  AIRFLOW__API_AUTH__JWT_SECRET: "9f8c1b7d9a2e4f6c8b0a1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"

  PYTHONPATH: /opt/airflow

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
  airflow-init:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    command: ["airflow", "db", "migrate"]

  airflow-api-server:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "9090:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./former:/opt/airflow/former
      - ./tests:/opt/airflow/tests
      - airflow-logs:/opt/airflow/logs
      - ./simple_auth_manager_passwords.json.generated:/opt/airflow/simple_auth_manager_passwords.json.generated
    environment:
      <<: *airflow-env
      AIRFLOW__API__SECRET_KEY: "another_long_secret_for_ui_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    command: ["airflow", "api-server"]

  airflow-scheduler:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./former:/opt/airflow/former
      - airflow-logs:/opt/airflow/logs
      - ./simple_auth_manager_passwords.json.generated:/opt/airflow/simple_auth_manager_passwords.json.generated

    environment:
      <<: *airflow-env
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DISPLAY: ":99"
    command: >
            bash -c "
              xvfb-run -a --server-args='-screen 0 1920x1080x24' airflow scheduler
            "

  airflow-dag-processor:
    build: .
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./former:/opt/airflow/former
      - airflow-logs:/opt/airflow/logs
      - ./simple_auth_manager_passwords.json.generated:/opt/airflow/simple_auth_manager_passwords.json.generated

    environment:
      <<: *airflow-env
    command: ["airflow", "dag-processor"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - ./former:/app/former
    ports:
      - "8000:8000"
    environment:
      AIRFLOW_HOST: "http://airflow-api-server:8080"
      AIRFLOW_BASE_URL: "http://airflow-api-server:8080/api/v2"
      AIRFLOW_USERNAME: admin
      AIRFLOW_PASSWORD: admin
      AIRFLOW_DAG_ID: form_filler_pipeline
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # MSSQL Database Configuration - connect to host's local MSSQL
      DB_USER: ${DB_USER:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-YourPassword123!}
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-former}
      DATABASE_URL: mssql+pyodbc://${DB_USER:-sa}:${DB_PASSWORD:-YourPassword123!}@${DB_HOST:-host.docker.internal}:${DB_PORT:-1433}/${DB_NAME:-former}?driver=ODBC+Driver+17+for+SQL+Server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      airflow-api-server:
        condition: service_started

  frontend:
    build:
      context: ./former/front
      dockerfile: ../../Dockerfile.front
    volumes:
      - ./former/front:/app
      - node_modules_front:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend

volumes:
  postgres-db-volume:
  airflow-logs:
  node_modules_front: